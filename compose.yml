version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: pride_user
      POSTGRES_PASSWORD: pride_password
      POSTGRES_DB: pride_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pride_user -d pride_db']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: postgresql://pride_user:pride_password@postgres:5432/pride_db
      MAIL_ENABLED: 'true'
      MAIL_HOST: mailhog
      MAIL_PORT: '1025'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/api/health'').read()"']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules  # ホストと分離
    environment:
      - NODE_ENV=development
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
      - mailhog

  mailhog:
    image: mailhog/mailhog
    ports:
      - '8025:8025' # UI
      - '1025:1025' # SMTP

volumes:
  postgres_data:
  frontend_node_modules:
